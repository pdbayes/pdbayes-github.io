        body {

            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            margin-right: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .poster {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            max-width: 300px;
        }
        .poster img {
            max-width: 100%;
            height: auto;
        }
        .no-results {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-top: 50px;
        }
        .toggle-container {
            margin-bottom: 15px;
            font-size: 16px;
        }
        .toggle-container label {
            margin: 0 10px;
            cursor: pointer;
        }
        .data-table-container {
            flex: 1 1 400px;
            max-width: 600px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .data-table th, .data-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .data-table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .data-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .no-poster {
            width: 100%;
            height: 200px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            margin-bottom: 10px;
        }
        .chart-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 30px auto;
        }
    </style>
</head>

            <label><input type="radio" name="searchMode" value="artist" onchange="toggleMode()"> Search by Artist</label>
        </div>
        <input type="text" id="searchInput" placeholder="Enter year (e.g., 1992)">
        <button onclick="performSearch()">Search</button>
    </div>

        function extractYear(src) {
            const filename = src.split('/').pop();
            const yearMatch = filename.match(/poster_(\d{4})/i);
            return yearMatch ? parseInt(yearMatch[1]) : null;
        }

        let festivalData = [];

        // Load JSON data
        fetch('data2.json')
            .then(response => response.json())
            .then(data => {
                festivalData = [];
                data.forEach(item => {
                    if (Array.isArray(item)) {
                        item.forEach(yearObj => processYearObject(yearObj));
                    } else if (typeof item === 'object' && item.year) {
                        processYearObject(item);
                    }
                });

                function processYearObject(yearObj) {
                    if (yearObj.status !== 'active' || !yearObj.lineup) return;
                    const year = yearObj.year;
                    for (const [day, stages] of Object.entries(yearObj.lineup)) {
                        if (typeof stages === 'object') {
                            for (const [stage, acts] of Object.entries(stages)) {
                                if (Array.isArray(acts)) {
                                    acts.forEach((act, index) => {
                                        festivalData.push({
                                            year: year,
                                            day: day,
                                            stage: stage,
                                            act: act,
                                            position: index + 1
                                        });
                                    });
                                }
                            }
                        }
                    }
                }
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = 'Error loading data.';
                console.error('Error fetching data:', error);
            });

        function toggleMode() {
            const mode = document.querySelector('input[name="searchMode"]:checked').value;
            const input = document.getElementById('searchInput');
            if (mode === 'year') {
                input.placeholder = "Enter year (e.g., 1992)";
            } else {
                input.placeholder = "Enter artist (e.g., Nirvana)";
            }
            input.value = '';
            document.getElementById('results').innerHTML = '';
        }

        function performSearch() {
            const mode = document.querySelector('input[name="searchMode"]:checked').value;
            const inputVal = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');

            if (!inputVal) {
                resultsDiv.innerHTML = '<p class="no-results">Please enter a search term.</p>';
                return;
            }

            if (mode === 'year') {
                searchByYear(inputVal, resultsDiv);
            } else {
                searchByArtist(inputVal, resultsDiv);
            }
        }

        function searchByYear(yearInput, resultsDiv) {
            const searchYear = parseInt(yearInput);
            if (isNaN(searchYear)) {
                resultsDiv.innerHTML = '<p class="no-results">Please enter a valid year.</p>';
                return;
            }

            const matchingPosters = posters.filter(poster => extractYear(poster.src) === searchYear);
            const actsForYear = festivalData.filter(item => item.year === searchYear);

            if (matchingPosters.length === 0 && actsForYear.length === 0) {
                resultsDiv.innerHTML = `<p class="no-results">No data found for ${searchYear}.</p>`;
                return;
            }

            let html = '<div class="results">';
            if (matchingPosters.length > 0) {
                const poster = matchingPosters[0];
                html += `
                    <div class="poster">
                        <img src="${poster.src}" alt="${poster.alt || `Reading Festival ${searchYear} Poster`}" width="${poster.width}" height="${poster.height}">
                        <p><strong>Year:</strong> ${searchYear}</p>
                        ${poster.alt ? `<p>${poster.alt}</p>` : ''}
                    </div>
                `;
            }

            if (actsForYear.length > 0) {
                html += `
                    <div class="data-table-container">
                        <h3>Acts in ${searchYear}</h3>
                        <table class="data-table">
                            <tr><th>Day</th><th>Stage</th><th>Act</th></tr>
                            ${actsForYear.map(act => `<tr><td>${act.day}</td><td>${act.stage}</td><td>${act.act}</td></tr>`).join('')}
                        </table>
                    </div>
                `;
            }
            html += '</div>';
            
            resultsDiv.innerHTML = html;
        }

        function searchByArtist(artistInput, resultsDiv) {
            const lowerInput = artistInput.toLowerCase();
            const artistPerformances = festivalData.filter(item => item.act.toLowerCase().includes(lowerInput));

            if (artistPerformances.length === 0) {
                resultsDiv.innerHTML = `<p class="no-results">No performances found for "${artistInput}".</p>`;
                return;
            }

            // Group by year to handle multiple performances in same year
            const grouped = {};
            artistPerformances.forEach(perf => {
                if (!grouped[perf.year]) grouped[perf.year] = [];
                grouped[perf.year].push(perf);
            });

            const yearsDesc = Object.keys(grouped).sort((a,b) => b - a);

            // Chart data generation
            const yearsAsc = Object.keys(grouped).sort((a,b) => a - b);
            const chartData = [];
            yearsAsc.forEach(year => {
                const actToFind = grouped[year][0];
                chartData.push({ year: year, position: actToFind.position });
            });

            let html = '';

            // Only show chart if there's more than one year
            if (yearsAsc.length > 1) {
                html += `<div class="chart-container"><canvas id="artistChart"></canvas></div>`;
            }

            html += '<div class="results">';
            html += yearsDesc.map(year => {
                const yearInt = parseInt(year);
                const matchingPosters = posters.filter(p => extractYear(p.src) === yearInt);
                const poster = matchingPosters.length > 0 ? matchingPosters[0] : null;

                const stages = grouped[year].map(p => `${p.stage} (${p.day})`).join('<br>');

                return `
                    <div class="poster">
                        ${poster ? `<img src="${poster.src}" alt="Poster ${year}" width="${poster.width}" height="${poster.height}">` : `<div class="no-poster">No Poster Available</div>`}
                        <p><strong>Year:</strong> ${year}</p>
                        <p><strong>Act:</strong> ${grouped[year][0].act}</p>
                        <p><strong>Stage:</strong><br>${stages}</p>
                    </div>
                `;
            }).join('');
            html += '</div>';

            resultsDiv.innerHTML = html;

            if (yearsAsc.length > 1) {
                const ctx = document.getElementById('artistChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: chartData.map(d => d.year),
                        datasets: [{
                            label: 'Bill Position',
                            data: chartData.map(d => d.position),
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0, 123, 255, 0.1)',
                            borderWidth: 2,
                            pointRadius: 4,
                            pointBackgroundColor: '#007bff',
                            fill: true,
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                reverse: true,
                                title: {
                                    display: true,
                                    text: 'Position on Bill (Lower is Better)'
                                },
                                ticks: {
                                    stepSize: 1
                                }
                            },
                            x: {
                                title: {
                                    display: true,
                                    text: 'Year'
                                }
                            }
                        },
                        plugins: {
                            title: {
                                display: true,
                                text: `Position on Bill Over Time: ${grouped[yearsAsc[0]][0].act}`
                            }
                        }
                    }
                });
            }
        }

        // Allow searching by pressing Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
