        function extractYear(src) {
            // Extract filename from URL
            const filename = src.split('/').pop();
            
            // Match year after reading_ or Reading_
            const yearMatch = filename.match(/(?:reading|Reading)_(\d+)/i);
            if (yearMatch) {
                const yearStr = yearMatch[1];
                const year = parseInt(yearStr);
                if (yearStr.length === 4) {
                    return year;
                } else if (yearStr.length === 2) {
                    return year >= 89 && year <= 99 ? 1900 + year : 2000 + year;
                }
            }
            // Special case for Reading-and-Leeds-Poster.jpg (likely 2013)
            if (filename.includes('Reading-and-Leeds-Poster.jpg')) {
                return 2013;
            }
            return null;
        }

        function searchPosters() {
            const yearInput = document.getElementById('yearInput').value.trim();
            const resultsDiv = document.getElementById('results');

            if (!yearInput) {
                resultsDiv.innerHTML = '<p class="no-results">Please enter a year to search.</p>';
                return;
            }

            const searchYear = parseInt(yearInput);
            if (isNaN(searchYear)) {
                resultsDiv.innerHTML = '<p class="no-results">Please enter a valid year.</p>';
                return;
            }

            const matchingPosters = posters.filter(poster => {
                const year = extractYear(poster.src);
                return year === searchYear;
            });

            if (matchingPosters.length === 0) {
                resultsDiv.innerHTML = `<p class="no-results">No posters found for ${searchYear}.</p>`;
                return;
            }

            resultsDiv.innerHTML = matchingPosters.map(poster => {
                const year = extractYear(poster.src);
                return `
                    <div class="poster">
                        <img src="${poster.src}" alt="${poster.alt || `Reading Festival ${year} Poster`}" width="${poster.width}" height="${poster.height}">
                        <p><strong>Year:</strong> ${year}</p>
                        ${poster.alt ? `<p>${poster.alt}</p>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Allow searching by pressing Enter
        document.getElementById('yearInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPosters();
            }
        });
